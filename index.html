<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MasayaさんAI — 解説資料・デック まとめ</title>
<meta name="description" content="GitHub Copilot を使った AI エージェント活用の解説資料・デックのキュレーションサイト" />
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --text: #e7e9ee;
    --muted: #9aa3b2;
    --accent: #6ea8fe;
    --border: #2a2f3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
      "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  .hero {
    padding: 72px 24px 40px;
    text-align: center;
    background: radial-gradient(1200px 400px at 50% -120px, rgba(110,168,254,0.25), transparent 70%);
    border-bottom: 1px solid var(--border);
  }
  .hero h1 { margin: 0 0 12px; font-size: 2.4rem; letter-spacing: 0.5px; }
  .hero p { margin: 0 auto; max-width: 620px; color: var(--muted); font-size: 1.05rem; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
  .section-label {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted); margin: 8px 0 20px;
  }
  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .card {
    display: flex; flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px 20px;
    text-decoration: none;
    color: inherit;
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); background: var(--panel-2); }
  .card .tag {
    align-self: flex-start;
    font-size: 0.72rem; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 999px;
    padding: 2px 10px; margin-bottom: 14px;
  }
  .card h3 { margin: 0 0 8px; font-size: 1.15rem; }
  .card p { margin: 0; color: var(--muted); font-size: 0.92rem; }
  .card .go { margin-top: 16px; color: var(--accent); font-size: 0.9rem; font-weight: 600; }
  .soon {
    border-style: dashed; opacity: 0.6; cursor: default;
  }
  .soon:hover { transform: none; border-color: var(--border); background: var(--panel); }
  footer {
    text-align: center; color: var(--muted); font-size: 0.82rem;
    padding: 32px 24px 48px; border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <header class="hero">
    <h1>MasayaさんAI</h1>
    <p>GitHub Copilot を使った AI エージェント活用の解説資料・デックをまとめたページです。新しい資料はここに追加していきます。</p>
  </header>

  <main class="wrap">
    <div class="section-label">資料一覧</div>
    <div class="grid">

      <a class="card" href="./decks/copilot-agents/">
        <span class="tag">デック</span>
        <h3>GitHub Copilot エージェント構成</h3>
        <p>目的別の AI スタッフを合図ひとつで動かす仕組みと、その作り方（MD 1枚）を初心者向けに解説。</p>
        <span class="go">スライドを開く →</span>
      </a>

      <div class="card soon">
        <span class="tag">準備中</span>
        <h3>次の資料はここに追加</h3>
        <p>解説資料やデックが増えたら、このページにカードとして並べていきます。</p>
      </div>

    </div>
  </main>

  <footer>
    Curated by Yu &middot; Built with <a href="https://marp.app/">Marp</a> &amp; GitHub Pages
  </footer>
</body>
</html>
